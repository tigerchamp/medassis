<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>家庭健康中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="phone-frame" id="app">
    <div class="app-header">
        <div class="header-left">
            <button class="family-selector" id="familySelectorBtn" onclick="App.toggleDropdown()">
                <i class="fas fa-users"></i>
                <span id="currentFamilyName">我的家庭</span>
                <i class="fas fa-chevron-down arrow"></i>
            </button>
            <div class="dropdown-menu" id="familyDropdown"></div>
        </div>
        <div class="header-right">
            <div class="msg-icon" onclick="App.openMessages()">
                <i class="fas fa-bell"></i>
                <span class="badge-dot" id="msgBadge" style="display:none;"></span>
            </div>
            <span class="username" id="headerUsername"></span>
            <div class="avatar-icon" onclick="App.switchPage('profile')">
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </div>
    <div class="main-content" id="mainContent"></div>
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="home" onclick="App.switchPage('home')"><i class="fas fa-home"></i><span>首页</span></button>
        <button class="nav-item" data-page="records" onclick="App.switchPage('records')"><i class="fas fa-notes-medical"></i><span>病历</span></button>
        <button class="nav-item camera-btn" onclick="App.openScanSelector()"><i class="fas fa-camera"></i></button>
        <button class="nav-item" data-page="pharmacy" onclick="App.switchPage('pharmacy')"><i class="fas fa-box"></i><span>药箱</span></button>
        <button class="nav-item" data-page="profile" onclick="App.switchPage('profile')"><i class="fas fa-user"></i><span>我的</span></button>
    </div>
    <div class="scan-overlay" id="scanOverlay" onclick="App.closeScanSelector(event)">
        <div class="scan-sheet" onclick="event.stopPropagation();">
            <div class="handle"></div>
            <div class="title">选择扫描类型</div>
            <button class="scan-option" onclick="App.startScan('病历')"><i class="fas fa-notes-medical"></i><div><div>病历</div><div class="desc">扫描纸质病历或电子档</div></div></button>
            <button class="scan-option" onclick="App.startScan('处方')"><i class="fas fa-prescription"></i><div><div>处方</div><div class="desc">识别处方药品信息</div></div></button>
            <button class="scan-option" onclick="App.startScan('报告')"><i class="fas fa-file-alt"></i><div><div>报告</div><div class="desc">检查报告、化验单</div></div></button>
            <button class="scan-option" onclick="App.startScan('药品')"><i class="fas fa-capsules"></i><div><div>药品</div><div class="desc">扫描药盒，自动录入药箱</div></div></button>
            <button class="scan-cancel" onclick="App.closeScanSelector()">取消</button>
        </div>
    </div>
    <div class="modal-overlay" id="modalOverlay" onclick="App.closeModal()">
        <div class="modal-content" id="modalContent" onclick="event.stopPropagation();"></div>
    </div>
    <div class="toast" id="toast"></div>
</div>
<script src="js/api.js"></script>
<script src="js/pages.js"></script>
<script src="js/app.js"></script>
<script>
App.init();
// 点击其他区域关闭下拉菜单
document.addEventListener('click', function(e) {
    const dd = document.getElementById('familyDropdown');
    const btn = document.getElementById('familySelectorBtn');
    if (dd && dd.classList.contains('show') && !dd.contains(e.target) && !btn.contains(e.target)) {
        dd.classList.remove('show');
    }
});
</script>
</body>
</html>
